---
# roles/netplan/tasks/main.yml
- name: Copy netplan configuration
  copy:
    src: 00-installer-config.yaml
    dest: /etc/netplan/00-installer-config.yaml
    owner: root
    group: root
    mode: '0644'
  notify: Apply netplan

- name: Flush handlers to apply netplan config
  meta: flush_handlers

- name: Add handler to apply netplan
  module_defaults:
    ansible.builtin.command:
      cmd: netplan apply
  rescue:
    - name: Netplan apply failed, trying with netplan generate
      command: netplan generate
      failed_when: false
