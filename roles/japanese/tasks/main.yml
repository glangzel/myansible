---
# roles/japanese/tasks/main.yml
- name: Install Japanese IME packages (Fcitx5 with Mozc)
  apt:
    name:
      - fcitx5
      - fcitx5-mozc
      - fcitx5-config-qt
      - fcitx5-frontend-gtk3
      - im-config
    state: present

- name: Set fcitx5 as the default IM for the system
  command: im-config -n fcitx5

- name: Configure environment variables for Fcitx5
  become: no
  blockinfile:
    path: "/home/{{ user_name }}/.xprofile"
    create: yes
    block: |
      export GTK_IM_MODULE=fcitx
      export QT_IM_MODULE=fcitx
      export XMODIFIERS=@im=fcitx
      export DefaultIMModule=fcitx5
    marker: "# {mark} ANSIBLE MANAGED BLOCK FOR Fcitx5"

- name: Create local font directory
  file:
    path: "/home/{{ user_name }}/.local/share/fonts"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0755'

- name: Download and install Moralerspace font
  unarchive:
    src: https://github.com/yuru7/moralerspace/releases/download/v2.0.0/MoralerspaceHW_v2.0.0.zip
    dest: "/home/{{ user_name }}/.local/share/fonts"
    remote_src: yes
    creates: "/home/{{ user_name }}/.local/share/fonts/MoralerspaceHW_v2.0.0"

- name: Update font cache
  command: fc-cache -fv
  changed_when: false
