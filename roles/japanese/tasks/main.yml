---
# roles/japanese/tasks/main.yml
- name: Install Japanese IME packages (Fcitx5 with Mozc)
  apt:
    name:
      - fcitx5
      - fcitx5-mozc
      - fcitx5-config-qt
      - fcitx5-frontend-gtk3
      - im-config
    state: present

- name: Set fcitx5 as the default IM for the system
  command: im-config -n fcitx5

- name: Configure environment variables for Fcitx5
  become: no
  blockinfile:
    path: "/home/{{ user_name }}/.xprofile"
    create: yes
    block: |
      export GTK_IM_MODULE=fcitx
      export QT_IM_MODULE=fcitx
      export XMODIFIERS=@im=fcitx
      export DefaultIMModule=fcitx5
    marker: "# {mark} ANSIBLE MANAGED BLOCK FOR Fcitx5"
