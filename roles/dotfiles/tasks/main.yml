---
# roles/dotfiles/tasks/main.yml
- name: Ensure .config directory exists
  become: no
  file:
    path: "/home/{{ user_name }}/.config"
    state: directory
    mode: '0755'

- name: Deploy dotfiles using GNU Stow
  become: no
  command: "stow -t /home/{{ user_name }}/ --dir={{ lookup('env', 'PWD') }}/dotfiles -S {{ item }}"
  loop:
    - bash
    - i3
    - polybar
    - rofi
    - tmux
    - alacritty
    - nvim
  register: stow_result
  changed_when: "'LINK: ' in stow_result.stdout"