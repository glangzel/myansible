---
# roles/desktop/tasks/main.yml
- name: Install core desktop packages
  apt:
    name:
      - i3-wm
      - polybar
      - rofi
      - lightdm
      - lightdm-gtk-greeter
      - picom
      - feh
      - xorg
    state: present
    update_cache: yes

- name: Copy LightDM configuration
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: '0644'
  loop:
    - { src: 'lightdm.conf', dest: '/etc/lightdm/lightdm.conf' }
    - { src: 'lightdm-webkit2-greeter.conf', dest: '/etc/lightdm/lightdm-webkit2-greeter.conf' }
  notify: Restart LightDM

- name: Set default graphical target
  systemd:
    name: graphical.target
    enabled: yes
    masked: no

- name: Enable LightDM service
  systemd:
    name: lightdm.service
    enabled: yes

- name: Add handler to restart lightdm
  meta: flush_handlers