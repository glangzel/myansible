---
# roles/desktop/tasks/main.yml
- name: Install core desktop packages
  apt:
    name:
      - i3-wm
      - polybar
      - rofi
      - lightdm
      - lightdm-webkit2-greeter
      - picom
      - feh
      - xorg
      - alacritty
    state: present
    update_cache: yes

- name: Set Alacritty as default terminal
  alternatives:
    name: x-terminal-emulator
    path: /usr/bin/alacritty

- name: Install dmg_blue theme for lightdm-webkit2-greeter
  git:
    repo: https://github.com/davidmogar/lightdm-webkit2-dmg_blue.git
    dest: /usr/share/lightdm-webkit/themes/dmg_blue
    depth: 1

- name: Copy LightDM configuration
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: '0644'
  loop:
    - { src: 'lightdm.conf', dest: '/etc/lightdm/lightdm.conf' }
    - { src: 'lightdm-webkit2-greeter.conf', dest: '/etc/lightdm/lightdm-webkit2-greeter.conf' }
  notify: Restart LightDM

- name: Set default graphical target
  systemd:
    name: graphical.target
    enabled: yes
    masked: no

- name: Enable LightDM service
  systemd:
    name: lightdm.service
    enabled: yes

- name: Add handler to restart lightdm
  meta: flush_handlers
